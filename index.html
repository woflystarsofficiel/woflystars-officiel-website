<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Woflystars</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #111;
    }

    section {
      padding: 40px 20px;
    }

    img {
      max-width: 300px;
      border-radius: 15px;
      margin-top: 15px;
    }

    iframe {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 10px;
    }

    .hero {
      padding-top: 60px;
    }
  </style>
</head>

<body>

  <!-- HERO SECTION -->
  <section id="home" class="hero">
    <h2>Welcome to Woflystars</h2>
    <p>Music • Story • Vibe</p>

    <img src="woflystars/woflystars.png">

    <br>

    <!-- YouTube Video -->
    <iframe 
      width="560" 
      height="315" 
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </section>

  <!-- VIDEOS SECTION (optional extra) -->
  <section id="videos">
    <h2>More Videos</h2>

    <iframe 
      width="560" 
      height="315" 
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="YouTube video player"
      frameborder="0"
      allowfullscreen>
    </iframe>

  </section>

</body>
</html>
