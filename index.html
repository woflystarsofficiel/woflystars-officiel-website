<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=2.0">
  <title>Woflystars</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #000000, #0a1a2f);
      color: white;
      cursor: none; /* hide default cursor */
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(0,0,0,0.8);
    }

    nav a {
      color: #4da6ff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: white;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 {
      font-family: "Dancing Script", cursive;
      font-size: 72px;
      margin: 0;
      background: linear-gradient(90deg, #4da6ff, #ffffff, #9b5cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(77,166,255,0.4);
    }

    .hero p {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.8;
    }

    .hero img {
      max-width: 90%;
      margin-top: 25px;
      border-radius: 20px;
      box-shadow: 0 0 20px #4da6ff;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      background: #4da6ff;
      color: black;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: white;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.8);
    }

    /* 🦋 Butterfly cursor */
    #cursor {
      width: 45px;
      height: 45px;
      position: fixed;
      pointer-events: none;
      z-index: 9999;

      background-image: url("butterfly.png"); /* your blue butterfly */
      background-size: contain;
      background-repeat: no-repeat;

      transform: translate(-50%, -50%);
      animation: flap 0.2s infinite;
    }

    /* 🪽 wing flap animation */
    @keyframes flap {
      0%   { transform: translate(-50%, -50%) scale(1) rotate(-5deg); }
      50%  { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(-5deg); }
    }

  </style>
</head>

<body>

<!-- 🦋 custom cursor -->
<div id="cursor"></div>

<header>
  <h1>Woflystars</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#music">Music</a>
    <a href="#links">Links</a>
  </nav>
</header>

<section id="home" class="hero">
  <h2>Welcome to Woflystars</h2>
  <p>Music • Story • Vibe</p>
  <img src="woflystars.png">
</section>

<section id="music" class="section">
  <h2>My Music</h2>
  <p>Listen to my songs on YouTube:</p>
  <a class="btn" href="https://youtube.com/@woflystars.officiell?si=i-nGlwxtcFIlt9k_" target="_blank">YouTube</a>
</section>

<section id="links" class="section">
  <h2>Follow & Support</h2>
  <a class="btn" href="https://www.instagram.com/woflystars_officiel" target="_blank">Instagram</a>
  <a class="btn" href="https://www.tiktok.com/@haru_haru_j.01_" target="_blank">TikTok</a>
  <a class="btn" href="https://woflystars-off.printify.me" target="_blank">Merch Shop</a>
</section>

<footer>
  <p>© 2026 Woflystars</p>
</footer>

<!-- 🦋 cursor movement script -->
<script>
document.addEventListener("mousemove", (e) => {
  const cursor = document.getElementById("cursor");
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
